<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Shiny Happy QR</title>

  <!-- Mobile viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wowdmxkuwysuihgoklki.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publisable_nlhqZhNjr3PO-HsqgY2qw_aCw2yF4Y";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.client = client;
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #000;
      color: #fff;
      font-family: "Baloo 2", sans-serif;
    }

    body {
      padding: 32px 20px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 360px;
      padding: 24px;
      border-radius: 18px;
      background: var(--sh-card);
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--sh-white);
    }

    p {
      font-size: 1rem;
      color: var(--sh-white);
      margin-bottom: 1.5rem;
    }

    button {
      background: var(--sh-blue);
      color: var(--sh-white);
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: var(--sh-white);
      color: var(--sh-blue);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Welcome to Shiny Happy Brewing</h1>
    <p>Scan complete! Let’s get your experience started.</p>
    <button id="startExperience">Begin</button>
  </div>

  <!-- Engine -->
  <script src="engine.js"></script>

  <script>
    document.getElementById("startExperience").addEventListener("click", async () => {
      try {
        // Extract QR parameters
        const urlParams = new URLSearchParams(window.location.search);
        const sourceType = urlParams.get("type") || "location";
        const sourceId = urlParams.get("id") || "unknown";
        const points = parseInt(urlParams.get("points") || "10");

        // Payload for engine
        const payload = {
          source_type: sourceType,
          source_id: sourceId,
          points: points
        };

        // Run experience (handles modal + points)
        const result = await window.runExperience(payload);

        // Redirect logic after awarding points
        if (sourceType === "location") {
          window.location.href = `qr-location.html?loc=${sourceId}`;
        } else if (sourceType === "beer") {
          window.location.href = `experience.html?beer=${sourceId}`;
        } else {
          window.location.href = `experience.html`;
        }
      } catch (err) {
        console.error("Error running experience:", err);
      }
    });
  </script>
</body>
</html>
