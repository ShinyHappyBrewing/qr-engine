<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Returning to Shiny Happy</title>

  <!-- Mobile viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>
  <script>
    const SUPABASE_URL = "https://wowdmxkuwysuihgoklki.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publisable_nlHqvZhnjR3PO-HsqgY2qw_aCw2yF4Y";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.client = client;
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: var(--sh-white);
      font-family: "Baloo 2", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--sh-card);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 1rem;
      color: var(--sh-white);
    }

    p {
      margin-bottom: 1.5rem;
      color: var(--sh-white);
    }

    input {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid var(--sh-blue);
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 1rem;
      text-align: center;
    }

    button {
      background: var(--sh-blue);
      color: var(--sh-white);
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: var(--sh-white);
      color: var(--sh-blue);
    }

    #status {
      margin-top: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Welcome Back to the ShinySide</h1>
    <p>Enter your email to save your points and claim your ShinySide ID.</p>
    <input type="email" id="emailInput" placeholder="Enter your email" />
    <button id="savePoints">Save Points</button>
    <div id="status"></div>
  </div>

  <script>
    async function handleReturn() {
      try {
        // Process Supabase magic link
        const { data, error } = await client.auth.getSession();
        if (error || !data.session) {
          document.getElementById("status").textContent = "Login failed. Try again.";
          return;
        }

        const email = data.session.user.email;
        const shinySideID = localStorage.getItem("shiny_side_id");

        if (!shinySideID) {
          document.getElementById("status").textContent = "No ShinySide ID found. Please scan again.";
          return;
        }

        // Look up user by ShinySide ID
        const { data: users } = await client
          .from("users")
          .select("*")
          .eq("shiny_side_id", shinySideID)
          .limit(1);

        let user = users && users[0];

        // If user exists, update with email and claim
        if (user) {
          const { error: updateError } = await client
            .from("users")
            .update({ email: email, claimed: true })
            .eq("shiny_side_id", shinySideID);

          if (updateError) {
            console.error("Error updating user:", updateError);
            document.getElementById("status").textContent = "Error saving your points.";
            return;
          }

          document.getElementById("status").textContent = "✨ Points saved! Your ShinySide ID is now claimed.";
          setTimeout(() => {
            window.location.href = "experience.html";
          }, 1500);
        } else {
          // Create new user if not found
          const base = email.split("@")[0];
          const { error: insertError } = await client
            .from("users")
            .insert([{ shiny_side_id: base, name: base, email: email, claimed: true }]);

          if (insertError) {
            console.error("Error creating user:", insertError);
            document.getElementById("status").textContent = "Error creating user.";
            return;
          }

          localStorage.setItem("shiny_side_id", base);
          document.getElementById("status").textContent = "✨ Welcome! Your ShinySide ID is now claimed.";
          setTimeout(() => {
            window.location.href = "experience.html";
          }, 1500);
        }
      } catch (err) {
        console.error("Error handling return:", err);
        document.getElementById("status").textContent = "Unexpected error. Try again.";
      }
    }

    document.getElementById("savePoints").addEventListener("click", async () => {
      const emailInput = document.getElementById("emailInput").value.trim();
      if (!emailInput) {
        document.getElementById("status").textContent = "Please enter your email.";
        return;
      }

      // Simulate claiming without magic link
      const shinySideID = localStorage.getItem("shiny_side_id");
      if (!shinySideID) {
        document.getElementById("status").textContent = "No ShinySide ID found.";
        return;
      }

      const { error } = await client
        .from("users")
        .update({ email: emailInput, claimed: true })
        .eq("shiny_side_id", shinySideID);

      if (error) {
        console.error("Error claiming ID:", error);
        document.getElementById("status").textContent = "Error saving your points.";
        return;
      }

      document.getElementById("status").textContent = "✨ Points saved! Your ShinySide ID is now claimed.";
      setTimeout(() => {
        window.location.href = "experience.html";
      }, 1500);
    });

    // Auto-run if magic link present
    handleReturn();
  </script>
</body>
</html>
