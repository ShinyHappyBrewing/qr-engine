<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Shiny Happy Location</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>

  <!-- Engine (Supabase client init + ShinySide ID modal + scoring) -->
  <script src="engine.js?v=2"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #000;
      color: #fff;
      font-family: "Baloo 2", sans-serif;
    }

    body {
      padding: 32px 20px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      border-radius: 18px;
      border: 2px solid #01A9CE;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 20px rgba(1,169,206,0.4);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--sh-white);
    }

    p {
      font-size: 1rem;
      color: var(--sh-white);
      margin-bottom: 1.5rem;
    }

    button {
      background: #01A9CE;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #fff;
      color: #01A9CE;
    }

    .comments {
      margin-top: 2rem;
      text-align: left;
    }

    .comment {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .comment strong {
      color: #01A9CE;
    }

    /* Beer Toast */
    .beer-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1.2rem;
      padding: 1rem 2rem;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      animation: fadeInOut 3s ease;
      z-index: 9999;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(20px); }
      10% { opacity: 1; transform: translateY(0); }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(20px); }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="locationName">Loading Location...</h1>
    <p id="locationDesc">Please wait while we fetch details.</p>
    <button id="claimPoints">Claim Points</button>

    <div class="comments" id="commentsSection">
      <h2>Guestbook</h2>
      <div id="commentsList"></div>

      <textarea id="newComment" placeholder="Leave a comment..." style="width:100%;height:80px;margin-top:10px;border-radius:8px;padding:8px;"></textarea>
      <button id="postComment" style="margin-top:10px;">Post Comment</button>
    </div>

    <!-- ADDED: Return button -->
    <button id="returnHome" style="margin-top:25px;width:100%;background:#444;">
      ← Return to Quest Board
    </button>
    <!-- END ADDED -->
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const locSlug = urlParams.get("loc");

    let shinySideId = null;

    async function ensureShinySideId() {
      const userData = await showShinySideModal();
      shinySideId = userData.shiny_side_id;
      return shinySideId;
    }

    // ---------------------------
    // LOAD LOCATION
    // ---------------------------
    async function loadLocation() {
      const { data, error } = await client
        .from("locations")
        .select("*")
        .eq("slug", locSlug)
        .single();

      if (error || !data) {
        document.getElementById("locationName").textContent = "Location not found.";
        return;
      }

      window.currentLocation = data;

      document.getElementById("locationName").textContent = data.name;
      document.getElementById("locationDesc").textContent =
        data.description || "Enjoy your visit!";
    }

    // ---------------------------
    // LOAD COMMENTS
    // ---------------------------
    async function loadComments() {
      if (!window.currentLocation) return;

      const { data, error } = await client
        .from("guestbook_entries")
        .select("*")
        .eq("location_id", window.currentLocation.id)
        .order("created", { ascending: false });

      const list = document.getElementById("commentsList");
      list.innerHTML = "";

      if (!data) return;

      data.forEach(entry => {
        const div = document.createElement("div");
        div.className = "comment";

        const displayName = entry.user_id || "Guest";

        const timestamp = new Date(entry.created).toLocaleString([], {
  dateStyle: "short",
  timeStyle: "short"
});

div.innerHTML = `
  <strong>${displayName}</strong>
  <span style="opacity:0.7;font-size:0.8rem;"> • ${timestamp}</span>
  <br>${entry.message}
`;
        list.appendChild(div);
      });
    }

    // ---------------------------
    // COOLDOWN CHECK
    // ---------------------------
    async function hasCooldown() {
      const today = new Date().toISOString().split("T")[0];

      const { data } = await client
        .from("scores")
        .select("*")
        .eq("user_id", shinySideId)
        .eq("source_id", locSlug)
        .gte("created", today + "T00:00:00");

      return data && data.length > 0;
    }

    // ---------------------------
    // AWARD POINTS
    // ---------------------------
    async function awardPoints() {
      if (!shinySideId) {
        await ensureShinySideId();
      }

      const cooldown = await hasCooldown();
      if (cooldown) {
        alert("You've already claimed points for this location today!");
        return;
      }

      await window.runExperience({
        source_type: "location_scan",
        source_id: locSlug,
        points: 10
      });

      window.showBeerToast(10);
      loadComments();
    }

    // ---------------------------
    // POST COMMENT
    // ---------------------------
    async function postComment() {
      if (!shinySideId) {
        await ensureShinySideId();
      }

      const text = document.getElementById("newComment").value.trim();
      if (!text || !window.currentLocation) return;

      await client.from("guestbook_entries").insert({
        user_id: shinySideId,
        location_id: window.currentLocation.id,
        message: text
      });

      document.getElementById("newComment").value = "";
      loadComments();
    }

    // ---------------------------
    // RETURN BUTTON HANDLER (ADDED)
    // ---------------------------
    document.getElementById("returnHome").addEventListener("click", () => {
      window.location.href = "experience.html";
    });
    // END ADDED

    // ---------------------------
    // INIT
    // ---------------------------
    document.getElementById("claimPoints").addEventListener("click", awardPoints);
    document.getElementById("postComment").addEventListener("click", postComment);

    ensureShinySideId().then(() => {
      loadLocation().then(loadComments);
    });
  </script>
</body>
</html>
