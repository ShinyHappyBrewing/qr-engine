<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Shiny Happy Location</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>
  <script>
    const SUPABASE_URL = "https://wowdmxkuwysuihgoklki.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publisable_nlHqvZhnjR3PO-HsqgY2qw_aCw2yF4Y";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.client = client;
  </script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #000;
      color: #fff;
      font-family: "Baloo 2", sans-serif;
    }

    body {
      padding: 32px 20px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      border-radius: 18px;
      border: 1px solid rgba(169,206,0,0.5);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 20px rgba(169,206,0,0.4);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--sh-white);
    }

    p {
      font-size: 1rem;
      color: var(--sh-white);
      margin-bottom: 1.5rem;
    }

    button {
      background: var(--sh-blue);
      color: var(--sh-white);
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: var(--sh-white);
      color: var(--sh-blue);
    }

    .comments {
      margin-top: 2rem;
      text-align: left;
    }

    .comment {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .comment strong {
      color: var(--sh-blue);
    }

    /* Beer Toast */
    .beer-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1.2rem;
      padding: 1rem 2rem;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      animation: fadeInOut 3s ease;
      z-index: 9999;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(20px); }
      10% { opacity: 1; transform: translateY(0); }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(20px); }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="locationName">Loading Location...</h1>
    <p id="locationDesc">Please wait while we fetch details.</p>
    <button id="claimPoints">Claim Points</button>

    <div class="comments" id="commentsSection">
      <h2>Guestbook</h2>
      <div id="commentsList"></div>

      <textarea id="newComment" placeholder="Leave a comment..." style="width:100%;height:80px;margin-top:10px;border-radius:8px;padding:8px;"></textarea>
      <button id="postComment" style="margin-top:10px;">Post Comment</button>
    </div>
  </div>

  <!-- Engine -->
  <script src="engine.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const locSlug = urlParams.get("loc");
    const shinySideId = localStorage.getItem("shiny_side_id");

    function showBeerToast(points) {
      const toast = document.createElement("div");
      toast.className = "beer-toast";
      toast.textContent = `🍺 +${points} points! Cheers!`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function loadLocation() {
      const { data, error } = await client
        .from("locations")
        .select("*")
        .eq("slug", locSlug)
        .single();

      if (error || !data) {
        document.getElementById("locationName").textContent = "Location not found.";
        return;
      }

      document.getElementById("locationName").textContent = data.name;
      document.getElementById("locationDesc").textContent = data.description || "Enjoy your visit!";
    }

    async function loadComments() {
      const { data, error } = await client
        .from("guestbook_entries")
        .select("*")
        .eq("location_slug", locSlug)
        .order("created_at", { ascending: false });

      const list = document.getElementById("commentsList");
      list.innerHTML = "";

      if (!data) return;

      data.forEach(entry => {
        const div = document.createElement("div");
        div.className = "comment";
        div.innerHTML = `<strong>${entry.shiny_side_id}</strong>: ${entry.comment}`;
        list.appendChild(div);
      });
    }

    async function hasCooldown() {
      const today = new Date().toISOString().split("T")[0];

      const { data } = await client
        .from("scores")
        .select("*")
        .eq("shiny_side_id", shinySideId)
        .eq("source_id", locSlug)
        .gte("created_at", today + "T00:00:00");

      return data && data.length > 0;
    }

    async function awardPoints() {
      if (!shinySideId) {
        alert("You must choose a ShinySide ID first!");
        return;
      }

      const cooldown = await hasCooldown();
      if (cooldown) {
        alert("You've already claimed points for this location today!");
        return;
      }

      const { error } = await client.from("scores").insert({
        shiny_side_id: shinySideId,
        source_type: "location_scan",
        source_id: locSlug,
        points: 10
      });

      if (!error) {
        showBeerToast(10);
        loadComments();
      }
    }

    async function postComment() {
      const text = document.getElementById("newComment").value.trim();
      if (!text) return;

      await client.from("guestbook_entries").insert({
        shiny_side_id: shinySideId,
        location_slug: locSlug,
        comment: text
      });

      document.getElementById("newComment").value = "";
      loadComments();
    }

    document.getElementById("claimPoints").addEventListener("click", awardPoints);
    document.getElementById("postComment").addEventListener("click", postComment);

    loadLocation();
    loadComments();
  </script>
</body>
</html>
