<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Shiny Happy Location</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <!-- Supabase (stable version) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>
  <script>
    const SUPABASE_URL = "https://wowdmxkuwysuihgoklki.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publisable_nlHqvZhnjR3PO-HsqgY2qw_aCw2yF4Y";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.client = client;
  </script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #000;
      color: #fff;
      font-family: "Baloo 2", sans-serif;
    }

    body {
      padding: 32px 20px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      border-radius: 18px;
      border: 1px solid rgba(169,206,0,0.5);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 20px rgba(169,206,0,0.4);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--sh-white);
    }

    p {
      font-size: 1rem;
      color: var(--sh-white);
      margin-bottom: 1.5rem;
    }

    button {
      background: var(--sh-blue);
      color: var(--sh-white);
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: var(--sh-white);
      color: var(--sh-blue);
    }

    .comments {
      margin-top: 2rem;
      text-align: left;
    }

    .comment {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .comment strong {
      color: var(--sh-blue);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="locationName">Loading Location...</h1>
    <p id="locationDesc">Please wait while we fetch details.</p>
    <button id="claimPoints">Claim Points</button>

    <div class="comments" id="commentsSection">
      <h2>Guestbook</h2>
      <div id="commentsList"></div>
    </div>
  </div>

  <!-- Engine -->
  <script src="engine.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const locSlug = urlParams.get("loc");

    async function loadLocation() {
      try {
        const { data, error } = await client
          .from("locations")
          .select("*")
          .eq("slug", locSlug)
          .single();

        if (error) {
          console.error("Error loading location:", error);
          document.getElementById("locationName").textContent = "Location not found.";
          return;
        }

        document.getElementById("locationName").textContent = data.name;
        document.getElementById("locationDesc").textContent = data.description || "Enjoy your visit!";
      } catch (err) {
        console.error("Error:", err);
      }
    }

    async function loadComments() {
      try {
        const { data, error } = await client
          .from("guestbook_entries")
          .select("*")
          .eq("location_slug", locSlug)
          .order("created_at", { ascending: false });

        if (error) {
          console.error("Error loading comments:", error);
          return;
        }

        const list = document.getElementById("commentsList");
        list.innerHTML = "";
        data.forEach(entry => {
          const div = document.createElement("div");
          div.className = "comment";
          div.innerHTML = `<strong>${entry.shiny_side_id}</strong>: ${entry.comment}`;
          list.appendChild(div);
        });
      } catch (err) {
        console.error("Error:", err);
      }
    }

    document.getElementById("claimPoints").addEventListener("click", async () => {
      try {
        const payload = {
          source_type: "location",
          source_id: locSlug,
          points: 10
        };

        const result = await window.runExperience(payload);
        console.log("Points awarded:", result);

        // Reload comments after awarding points
        await loadComments();
      } catch (err) {
        console.error("Error running experience:", err);
      }
    });

    // Initialize
    loadLocation();
    loadComments();
  </script>
</body>
</html>
